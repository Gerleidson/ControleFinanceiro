<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0c0f;
      --surface: #111418;
      --surface2: #181c22;
      --border: #1e2430;
      --accent: #1a9aff;
      --accent2: #00e5b0;
      --danger: #ff4d6a;
      --warning: #ffb830;
      --text: #e8edf5;
      --text2: #7a8499;
      --text3: #4a5568;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: contain;
    }
    .header-title {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .header-title span { color: var(--accent); }
    .header-spacer { flex: 1; }
    .header-year {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--text3);
    }

    /* LAYOUT */
    .app {
      display: flex;
      min-height: calc(100vh - 64px);
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      flex-shrink: 0;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0 20px;
      margin-bottom: 8px;
      margin-top: 16px;
    }
    .month-btn {
      display: block;
      width: 100%;
      padding: 9px 20px;
      background: none;
      border: none;
      color: var(--text2);
      text-align: left;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.15s;
      border-left: 3px solid transparent;
      position: relative;
    }
    .month-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .month-btn.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(26,154,255,0.07);
    }
    .month-badge {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: white;
      font-size: 0.6rem;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      display: none;
    }
    .month-btn.has-data .month-badge { display: inline-block; }

    /* MAIN CONTENT */
    .main {
      flex: 1;
      padding: 28px 32px;
      min-width: 0;
    }

    .month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .month-title {
      font-family: 'Space Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }
    .month-title span { color: var(--accent); }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--text3); }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .stat-value.green { color: var(--accent2); }
    .stat-value.red { color: var(--danger); }
    .stat-value.blue { color: var(--accent); }
    .stat-value.profit-pos { color: var(--accent2); }
    .stat-value.profit-neg { color: var(--danger); }

    /* TABS */
    .section-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
      width: fit-content;
    }
    .section-tab {
      padding: 8px 18px;
      border: none;
      background: none;
      color: var(--text2);
      border-radius: 7px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .section-tab:hover { color: var(--text); }
    .section-tab.active {
      background: var(--surface2);
      color: var(--text);
      font-weight: 600;
    }

    /* PANELS */
    .panel { display: none; }
    .panel.active { display: block; }

    /* FORM + LIST LAYOUT */
    .panel-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* FORM CARD */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .form-card h3 {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface); }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      margin-top: 4px;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #0080e0; }
    .btn-success { background: var(--accent2); color: #0a2a1e; }
    .btn-success:hover { background: #00c090; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #e0003a; }
    .btn-warning { background: var(--warning); color: #2a1a00; }
    .btn-warning:hover { background: #e0a000; }
    .btn-pdf { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-pdf:hover { background: var(--border); }
    .btn-sm {
      padding: 4px 10px;
      font-size: 0.75rem;
      width: auto;
      border-radius: 6px;
      background: rgba(255,77,106,0.12);
      color: var(--danger);
      border: 1px solid rgba(255,77,106,0.2);
    }
    .btn-sm:hover { background: rgba(255,77,106,0.22); }

    /* LIST CARD */
    .list-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .list-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .list-card-header h3 {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .list-card-total {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
    }
    .list-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text3);
      font-size: 0.85rem;
    }
    .list-item {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      transition: background 0.1s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: rgba(255,255,255,0.02); }
    .list-item-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .icon-expense { background: rgba(255,77,106,0.12); color: var(--danger); }
    .icon-sale { background: rgba(0,229,176,0.12); color: var(--accent2); }
    .icon-debt { background: rgba(255,184,48,0.12); color: var(--warning); }
    .icon-goal { background: rgba(26,154,255,0.12); color: var(--accent); }
    .list-item-info { flex: 1; min-width: 0; }
    .list-item-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-item-meta {
      font-size: 0.75rem;
      color: var(--text2);
      margin-top: 2px;
    }
    .list-item-value {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .badge-payment {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 6px;
    }
    .badge-pix { background: rgba(26,154,255,0.15); color: var(--accent); }
    .badge-dinheiro { background: rgba(0,229,176,0.15); color: var(--accent2); }
    .badge-cartao { background: rgba(255,184,48,0.15); color: var(--warning); }

    /* REPORT GRID */
    .report-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .report-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .report-card-header {
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .report-card-body { padding: 16px; }
    .report-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .report-row:last-child { border-bottom: none; }
    .report-row-label { color: var(--text2); }
    .report-row-value { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--text); font-size: 0.82rem; }

    /* GOALS LIST */
    .goal-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .goal-item:last-child { border-bottom: none; }
    .goal-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      flex-shrink: 0;
    }
    .goal-text { flex: 1; font-size: 0.9rem; color: var(--text); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 16px; }
      .stats-row { grid-template-columns: 1fr; }
      .panel-grid { grid-template-columns: 1fr; }
      .report-grid { grid-template-columns: 1fr; }
      .section-tabs { width: 100%; overflow-x: auto; }
    }

    /* ANIMATIONS */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .panel.active { animation: fadeIn 0.2s ease; }
    .list-item { animation: fadeIn 0.15s ease; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header class="header">
  <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1a9aff22,#00e5b022);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
    </svg>
  </div>
  <span class="header-title">Controle <span>Financeiro</span></span>
  <div class="header-spacer"></div>
  <span class="header-year" id="current-year"></span>
</header>

<div class="app">
  <nav class="sidebar">
    <div class="sidebar-label">Meses</div>
    <div id="month-nav"></div>
  </nav>

  <main class="main" id="main-content">
    <!-- Content injected by JS -->
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const PAY_LABELS = { pix: 'PIX', dinheiro: 'Dinheiro', cartao: 'Cartão' };
const PAY_CLASS = { pix: 'badge-pix', dinheiro: 'badge-dinheiro', cartao: 'badge-cartao' };

// DATA
const data = {
  expenses: Array.from({length:12},()=>[]),
  sales: Array.from({length:12},()=>[]),
  debts: Array.from({length:12},()=>[]),
  goals: Array.from({length:12},()=>[])
};

let activeMonth = new Date().getMonth();
let activeSection = {};

// INIT
document.getElementById('current-year').textContent = new Date().getFullYear();

function init() {
  const nav = document.getElementById('month-nav');
  MONTHS.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (i === activeMonth ? ' active' : '');
    btn.dataset.index = i;
    btn.innerHTML = `${m}<span class="month-badge" id="badge-${i}">●</span>`;
    btn.onclick = () => setMonth(i);
    nav.appendChild(btn);
  });

  renderMonth(activeMonth);
}

function setMonth(i) {
  activeMonth = i;
  document.querySelectorAll('.month-btn').forEach(b => b.classList.toggle('active', +b.dataset.index === i));
  renderMonth(i);
}

function renderMonth(i) {
  const sec = activeSection[i] || 'gastos';
  const totExp = sum(data.expenses[i]);
  const totSal = sum(data.sales[i]);
  const profit = totSal - totExp;
  const profitClass = profit >= 0 ? 'profit-pos' : 'profit-neg';

  document.getElementById('main-content').innerHTML = `
    <div class="month-header">
      <div class="month-title">${MONTHS[i]} <span>·</span> <span style="font-size:1rem;color:var(--text2)">${new Date().getFullYear()}</span></div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Vendas</div>
        <div class="stat-value green" id="stat-sales-${i}">${fmt(totSal)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Gastos</div>
        <div class="stat-value red" id="stat-expenses-${i}">${fmt(totExp)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Lucro</div>
        <div class="stat-value ${profitClass}" id="stat-profit-${i}">${fmt(profit)}</div>
      </div>
    </div>
    <div class="section-tabs">
      <button class="section-tab ${sec==='gastos'?'active':''}" onclick="setSection(${i},'gastos')">Gastos</button>
      <button class="section-tab ${sec==='vendas'?'active':''}" onclick="setSection(${i},'vendas')">Vendas</button>
      <button class="section-tab ${sec==='despesas'?'active':''}" onclick="setSection(${i},'despesas')">Despesas</button>
      <button class="section-tab ${sec==='metas'?'active':''}" onclick="setSection(${i},'metas')">Metas</button>
      <button class="section-tab ${sec==='relatorio'?'active':''}" onclick="setSection(${i},'relatorio')">Relatório</button>
    </div>
    <div id="panels-${i}">
      ${renderPanels(i, sec)}
    </div>
  `;
}

function setSection(i, sec) {
  activeSection[i] = sec;
  document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`panels-${i}`).innerHTML = renderPanels(i, sec);
}

function renderPanels(i, sec) {
  return `
    ${renderGastosPanel(i, sec)}
    ${renderVendasPanel(i, sec)}
    ${renderDespesasPanel(i, sec)}
    ${renderMetasPanel(i, sec)}
    ${renderRelatorioPanel(i, sec)}
  `;
}

function renderGastosPanel(i, sec) {
  if (sec !== 'gastos') return '';
  return `<div class="panel active" id="panel-gastos-${i}">
    <div class="panel-grid">
      <div class="form-card">
        <h3>Adicionar Gasto</h3>
        <div class="form-group">
          <label>Produto</label>
          <input type="text" id="exp-product-${i}" placeholder="Nome do produto">
        </div>
        <div class="form-group">
          <label>Valor Unitário (R$)</label>
          <input type="number" id="exp-unit-${i}" placeholder="0,00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Quantidade</label>
          <input type="number" id="exp-qty-${i}" placeholder="1" min="1">
        </div>
        <div class="form-group">
          <label>Pagamento</label>
          <select id="exp-pay-${i}">
            <option value="pix">PIX</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="cartao">Cartão</option>
          </select>
        </div>
        <button class="btn btn-danger" onclick="addExpense(${i})">+ Adicionar Gasto</button>
      </div>
      <div class="list-card">
        <div class="list-card-header">
          <h3>Lançamentos</h3>
          <span class="list-card-total" id="tot-exp-${i}">${fmt(sum(data.expenses[i]))}</span>
        </div>
        <div id="list-exp-${i}">${renderExpenseList(i)}</div>
      </div>
    </div>
  </div>`;
}

function renderVendasPanel(i, sec) {
  if (sec !== 'vendas') return '';
  return `<div class="panel active" id="panel-vendas-${i}">
    <div class="panel-grid">
      <div class="form-card">
        <h3>Adicionar Venda</h3>
        <div class="form-group">
          <label>Produto</label>
          <input type="text" id="sal-product-${i}" placeholder="Nome do produto">
        </div>
        <div class="form-group">
          <label>Valor Unitário (R$)</label>
          <input type="number" id="sal-unit-${i}" placeholder="0,00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Quantidade</label>
          <input type="number" id="sal-qty-${i}" placeholder="1" min="1">
        </div>
        <div class="form-group">
          <label>Pagamento</label>
          <select id="sal-pay-${i}">
            <option value="pix">PIX</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="cartao">Cartão</option>
          </select>
        </div>
        <button class="btn btn-success" onclick="addSale(${i})">+ Adicionar Venda</button>
      </div>
      <div class="list-card">
        <div class="list-card-header">
          <h3>Lançamentos</h3>
          <span class="list-card-total" style="color:var(--accent2)" id="tot-sal-${i}">${fmt(sum(data.sales[i]))}</span>
        </div>
        <div id="list-sal-${i}">${renderSaleList(i)}</div>
      </div>
    </div>
  </div>`;
}

function renderDespesasPanel(i, sec) {
  if (sec !== 'despesas') return '';
  return `<div class="panel active" id="panel-despesas-${i}">
    <div class="panel-grid">
      <div class="form-card">
        <h3>Adicionar Despesa</h3>
        <div class="form-group">
          <label>Nome da Despesa</label>
          <input type="text" id="debt-name-${i}" placeholder="Ex: Aluguel">
        </div>
        <div class="form-group">
          <label>Valor (R$)</label>
          <input type="number" id="debt-val-${i}" placeholder="0,00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Vencimento</label>
          <input type="date" id="debt-date-${i}">
        </div>
        <button class="btn btn-warning" onclick="addDebt(${i})">+ Adicionar Despesa</button>
      </div>
      <div class="list-card">
        <div class="list-card-header">
          <h3>Despesas</h3>
          <span class="list-card-total" style="color:var(--warning)" id="tot-debt-${i}">${fmt(sum(data.debts[i]))}</span>
        </div>
        <div id="list-debt-${i}">${renderDebtList(i)}</div>
      </div>
    </div>
  </div>`;
}

function renderMetasPanel(i, sec) {
  if (sec !== 'metas') return '';
  return `<div class="panel active" id="panel-metas-${i}">
    <div class="panel-grid">
      <div class="form-card">
        <h3>Nova Meta</h3>
        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="goal-desc-${i}" placeholder="Ex: Faturar R$ 10.000">
        </div>
        <button class="btn btn-primary" onclick="addGoal(${i})">+ Adicionar Meta</button>
      </div>
      <div class="list-card">
        <div class="list-card-header">
          <h3>Metas do Mês</h3>
          <span class="list-card-total">${data.goals[i].length} meta${data.goals[i].length !== 1 ? 's':''}</span>
        </div>
        <div id="list-goal-${i}">${renderGoalList(i)}</div>
      </div>
    </div>
  </div>`;
}

function renderRelatorioPanel(i, sec) {
  if (sec !== 'relatorio') return '';
  const totExp = sum(data.expenses[i]);
  const totSal = sum(data.sales[i]);
  const totDebt = sum(data.debts[i]);
  const profit = totSal - totExp;
  const profitClass = profit >= 0 ? 'var(--accent2)' : 'var(--danger)';

  const expPix = sumBy(data.expenses[i], 'pix');
  const expDin = sumBy(data.expenses[i], 'dinheiro');
  const expCart = sumBy(data.expenses[i], 'cartao');
  const salPix = sumBy(data.sales[i], 'pix');
  const salDin = sumBy(data.sales[i], 'dinheiro');
  const salCart = sumBy(data.sales[i], 'cartao');

  return `<div class="panel active" id="panel-relatorio-${i}">
    <div class="report-grid">
      <div class="report-card">
        <div class="report-card-header">Gastos</div>
        <div class="report-card-body">
          <div class="report-row"><span class="report-row-label">PIX</span><span class="report-row-value">${fmt(expPix)}</span></div>
          <div class="report-row"><span class="report-row-label">Dinheiro</span><span class="report-row-value">${fmt(expDin)}</span></div>
          <div class="report-row"><span class="report-row-label">Cartão</span><span class="report-row-value">${fmt(expCart)}</span></div>
          <div class="report-row"><span class="report-row-label" style="font-weight:700;color:var(--text)">Total</span><span class="report-row-value" style="color:var(--danger)">${fmt(totExp)}</span></div>
        </div>
      </div>
      <div class="report-card">
        <div class="report-card-header">Vendas</div>
        <div class="report-card-body">
          <div class="report-row"><span class="report-row-label">PIX</span><span class="report-row-value">${fmt(salPix)}</span></div>
          <div class="report-row"><span class="report-row-label">Dinheiro</span><span class="report-row-value">${fmt(salDin)}</span></div>
          <div class="report-row"><span class="report-row-label">Cartão</span><span class="report-row-value">${fmt(salCart)}</span></div>
          <div class="report-row"><span class="report-row-label" style="font-weight:700;color:var(--text)">Total</span><span class="report-row-value" style="color:var(--accent2)">${fmt(totSal)}</span></div>
        </div>
      </div>
      <div class="report-card">
        <div class="report-card-header">Resultado</div>
        <div class="report-card-body">
          <div class="report-row"><span class="report-row-label">Vendas</span><span class="report-row-value" style="color:var(--accent2)">${fmt(totSal)}</span></div>
          <div class="report-row"><span class="report-row-label">Gastos</span><span class="report-row-value" style="color:var(--danger)">- ${fmt(totExp)}</span></div>
          <div class="report-row"><span class="report-row-label">Despesas</span><span class="report-row-value" style="color:var(--warning)">${fmt(totDebt)}</span></div>
          <div class="report-row"><span class="report-row-label" style="font-weight:700;color:var(--text)">Lucro</span><span class="report-row-value" style="color:${profitClass}">${fmt(profit)}</span></div>
        </div>
      </div>
    </div>
    <button class="btn btn-pdf" style="width:auto;padding:10px 24px" onclick="downloadPDF(${i})">
      ↓ Baixar PDF — ${MONTHS[i]}
    </button>
  </div>`;
}

// LIST RENDERERS
function renderExpenseList(i) {
  if (!data.expenses[i].length) return '<div class="list-empty">Nenhum gasto registrado</div>';
  return data.expenses[i].map((e, j) => `
    <div class="list-item">
      <div class="list-item-icon icon-expense">↓</div>
      <div class="list-item-info">
        <div class="list-item-name">${e.product}</div>
        <div class="list-item-meta"><span class="badge-payment ${PAY_CLASS[e.paymentMethod]}">${PAY_LABELS[e.paymentMethod]}</span>${e.unitValue.toFixed(2)} × ${e.quantity}</div>
      </div>
      <div class="list-item-value" style="color:var(--danger)">${fmt(e.totalValue)}</div>
      <button class="btn btn-sm" onclick="deleteExpense(${i},${j})">✕</button>
    </div>`).join('');
}

function renderSaleList(i) {
  if (!data.sales[i].length) return '<div class="list-empty">Nenhuma venda registrada</div>';
  return data.sales[i].map((s, j) => `
    <div class="list-item">
      <div class="list-item-icon icon-sale">↑</div>
      <div class="list-item-info">
        <div class="list-item-name">${s.product}</div>
        <div class="list-item-meta"><span class="badge-payment ${PAY_CLASS[s.paymentMethod]}">${PAY_LABELS[s.paymentMethod]}</span>${s.unitValue.toFixed(2)} × ${s.quantity}</div>
      </div>
      <div class="list-item-value" style="color:var(--accent2)">${fmt(s.totalValue)}</div>
      <button class="btn btn-sm" onclick="deleteSale(${i},${j})">✕</button>
    </div>`).join('');
}

function renderDebtList(i) {
  if (!data.debts[i].length) return '<div class="list-empty">Nenhuma despesa registrada</div>';
  return data.debts[i].map((d, j) => `
    <div class="list-item">
      <div class="list-item-icon icon-debt">!</div>
      <div class="list-item-info">
        <div class="list-item-name">${d.name}</div>
        <div class="list-item-meta">Vencimento: ${formatDate(d.dueDate)}</div>
      </div>
      <div class="list-item-value" style="color:var(--warning)">${fmt(d.value)}</div>
      <button class="btn btn-sm" onclick="deleteDebt(${i},${j})">✕</button>
    </div>`).join('');
}

function renderGoalList(i) {
  if (!data.goals[i].length) return '<div class="list-empty">Nenhuma meta definida</div>';
  return data.goals[i].map((g, j) => `
    <div class="goal-item">
      <div class="goal-check"></div>
      <div class="goal-text">${g.description}</div>
      <button class="btn btn-sm" onclick="deleteGoal(${i},${j})">✕</button>
    </div>`).join('');
}

// ADD FUNCTIONS
function addExpense(i) {
  const product = document.getElementById(`exp-product-${i}`).value.trim();
  const unitValue = parseFloat(document.getElementById(`exp-unit-${i}`).value);
  const quantity = parseInt(document.getElementById(`exp-qty-${i}`).value);
  const paymentMethod = document.getElementById(`exp-pay-${i}`).value;
  if (!product || isNaN(unitValue) || isNaN(quantity) || unitValue <= 0 || quantity <= 0) { showToast('Preencha todos os campos corretamente.', 'danger'); return; }
  data.expenses[i].push({ product, unitValue, quantity, paymentMethod, totalValue: unitValue * quantity });
  clearFields(`exp-product-${i}`, `exp-unit-${i}`, `exp-qty-${i}`);
  refreshExpenses(i);
  updateBadge(i);
  showToast('Gasto adicionado!');
}

function addSale(i) {
  const product = document.getElementById(`sal-product-${i}`).value.trim();
  const unitValue = parseFloat(document.getElementById(`sal-unit-${i}`).value);
  const quantity = parseInt(document.getElementById(`sal-qty-${i}`).value);
  const paymentMethod = document.getElementById(`sal-pay-${i}`).value;
  if (!product || isNaN(unitValue) || isNaN(quantity) || unitValue <= 0 || quantity <= 0) { showToast('Preencha todos os campos corretamente.', 'danger'); return; }
  data.sales[i].push({ product, unitValue, quantity, paymentMethod, totalValue: unitValue * quantity });
  clearFields(`sal-product-${i}`, `sal-unit-${i}`, `sal-qty-${i}`);
  refreshSales(i);
  updateBadge(i);
  showToast('Venda adicionada!');
}

function addDebt(i) {
  const name = document.getElementById(`debt-name-${i}`).value.trim();
  const value = parseFloat(document.getElementById(`debt-val-${i}`).value);
  const dueDate = document.getElementById(`debt-date-${i}`).value;
  if (!name || isNaN(value) || value <= 0 || !dueDate) { showToast('Preencha todos os campos corretamente.', 'danger'); return; }
  data.debts[i].push({ name, value, dueDate });
  clearFields(`debt-name-${i}`, `debt-val-${i}`, `debt-date-${i}`);
  refreshDebts(i);
  updateBadge(i);
  showToast('Despesa adicionada!');
}

function addGoal(i) {
  const description = document.getElementById(`goal-desc-${i}`).value.trim();
  if (!description) { showToast('Digite uma descrição para a meta.', 'danger'); return; }
  data.goals[i].push({ description });
  document.getElementById(`goal-desc-${i}`).value = '';
  refreshGoals(i);
  updateBadge(i);
  showToast('Meta adicionada!');
}

// DELETE FUNCTIONS
function deleteExpense(i, j) { data.expenses[i].splice(j, 1); refreshExpenses(i); updateBadge(i); }
function deleteSale(i, j) { data.sales[i].splice(j, 1); refreshSales(i); updateBadge(i); }
function deleteDebt(i, j) { data.debts[i].splice(j, 1); refreshDebts(i); updateBadge(i); }
function deleteGoal(i, j) { data.goals[i].splice(j, 1); refreshGoals(i); updateBadge(i); }

// REFRESH FUNCTIONS
function refreshExpenses(i) {
  const listEl = document.getElementById(`list-exp-${i}`);
  const totEl = document.getElementById(`tot-exp-${i}`);
  if (listEl) listEl.innerHTML = renderExpenseList(i);
  if (totEl) totEl.textContent = fmt(sum(data.expenses[i]));
  refreshStats(i);
}
function refreshSales(i) {
  const listEl = document.getElementById(`list-sal-${i}`);
  const totEl = document.getElementById(`tot-sal-${i}`);
  if (listEl) listEl.innerHTML = renderSaleList(i);
  if (totEl) totEl.textContent = fmt(sum(data.sales[i]));
  refreshStats(i);
}
function refreshDebts(i) {
  const listEl = document.getElementById(`list-debt-${i}`);
  const totEl = document.getElementById(`tot-debt-${i}`);
  if (listEl) listEl.innerHTML = renderDebtList(i);
  if (totEl) totEl.textContent = fmt(sum(data.debts[i]));
}
function refreshGoals(i) {
  const listEl = document.getElementById(`list-goal-${i}`);
  if (listEl) listEl.innerHTML = renderGoalList(i);
  const header = listEl?.closest('.list-card')?.querySelector('.list-card-total');
  if (header) header.textContent = `${data.goals[i].length} meta${data.goals[i].length !== 1 ? 's':''}`;
}

function refreshStats(i) {
  const totExp = sum(data.expenses[i]);
  const totSal = sum(data.sales[i]);
  const profit = totSal - totExp;
  const se = document.getElementById(`stat-expenses-${i}`);
  const ss = document.getElementById(`stat-sales-${i}`);
  const sp = document.getElementById(`stat-profit-${i}`);
  if (se) se.textContent = fmt(totExp);
  if (ss) ss.textContent = fmt(totSal);
  if (sp) {
    sp.textContent = fmt(profit);
    sp.className = 'stat-value ' + (profit >= 0 ? 'profit-pos' : 'profit-neg');
  }
}

function updateBadge(i) {
  const hasData = data.expenses[i].length || data.sales[i].length || data.debts[i].length || data.goals[i].length;
  const btn = document.querySelector(`.month-btn[data-index="${i}"]`);
  if (btn) btn.classList.toggle('has-data', !!hasData);
}

// PDF
function downloadPDF(i) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const totExp = sum(data.expenses[i]);
  const totSal = sum(data.sales[i]);
  const profit = totSal - totExp;

  doc.setFontSize(18);
  doc.text(`Controle Financeiro — ${MONTHS[i]} ${new Date().getFullYear()}`, 14, 20);
  doc.setFontSize(11);
  doc.setTextColor(100);

  let y = 35;
  doc.setTextColor(0);
  doc.setFontSize(13);
  doc.text('Gastos', 14, y); y += 7;
  doc.setFontSize(10);
  data.expenses[i].forEach(e => { doc.text(`  ${e.product} (${PAY_LABELS[e.paymentMethod]}) — ${e.quantity}x R$ ${e.unitValue.toFixed(2)} = R$ ${e.totalValue.toFixed(2)}`, 14, y); y += 6; });
  doc.setFontSize(11); doc.text(`  Total Gastos: R$ ${totExp.toFixed(2)}`, 14, y); y += 10;

  doc.setFontSize(13);
  doc.text('Vendas', 14, y); y += 7;
  doc.setFontSize(10);
  data.sales[i].forEach(s => { doc.text(`  ${s.product} (${PAY_LABELS[s.paymentMethod]}) — ${s.quantity}x R$ ${s.unitValue.toFixed(2)} = R$ ${s.totalValue.toFixed(2)}`, 14, y); y += 6; });
  doc.setFontSize(11); doc.text(`  Total Vendas: R$ ${totSal.toFixed(2)}`, 14, y); y += 10;

  if (data.debts[i].length) {
    doc.setFontSize(13);
    doc.text('Despesas', 14, y); y += 7;
    doc.setFontSize(10);
    data.debts[i].forEach(d => { doc.text(`  ${d.name} — R$ ${d.value.toFixed(2)} (venc: ${formatDate(d.dueDate)})`, 14, y); y += 6; });
    y += 4;
  }

  doc.setFontSize(14);
  doc.setTextColor(profit >= 0 ? [0, 160, 100] : [200, 0, 50]);
  doc.text(`Lucro: R$ ${profit.toFixed(2)}`, 14, y);

  doc.save(`relatorio-${MONTHS[i].toLowerCase()}-${new Date().getFullYear()}.pdf`);
  showToast('PDF gerado com sucesso!');
}

// HELPERS
function sum(arr) { return arr.reduce((t, item) => t + (item.totalValue || item.value || 0), 0); }
function sumBy(arr, pay) { return arr.filter(x => x.paymentMethod === pay).reduce((t, x) => t + x.totalValue, 0); }
function fmt(n) { return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function formatDate(d) { if (!d) return ''; const [y,m,dd] = d.split('-'); return `${dd}/${m}/${y}`; }
function clearFields(...ids) { ids.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; }); }

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderLeftColor = type === 'danger' ? 'var(--danger)' : 'var(--accent2)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
