<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Controle Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c0f;
      --surface: #111418;
      --surface2: #181c22;
      --border: #1e2430;
      --accent: #1a9aff;
      --accent2: #00e5b0;
      --danger: #ff4d6a;
      --text: #e8edf5;
      --text2: #7a8499;
      --text3: #4a5568;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,229,176,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(26,154,255,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }
    .card-logo {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(0,229,176,0.15), rgba(26,154,255,0.1));
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    .card-title {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-subtitle { font-size: 0.9rem; color: var(--text2); margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text2); margin-bottom: 7px; }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(0,229,176,0.1); }
    input::placeholder { color: var(--text3); }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent2);
      color: #062a1e;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: #00c090; }
    .btn-submit:active { transform: scale(0.99); }
    .card-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--text2);
    }
    .card-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .card-link a:hover { text-decoration: underline; }
    .msg {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error { background: rgba(255,77,106,0.1); border: 1px solid rgba(255,77,106,0.3); color: var(--danger); }
    .msg.success { background: rgba(0,229,176,0.1); border: 1px solid rgba(0,229,176,0.3); color: var(--accent2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="card-title">Criar conta</div>
    <div class="card-subtitle">Preencha os dados para começar</div>

    <div class="msg" id="msg"></div>

    <div class="form-group">
      <label for="fullname">Nome Completo</label>
      <input type="text" id="fullname" placeholder="Seu nome completo">
    </div>
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label for="username">Usuário</label>
      <input type="text" id="username" placeholder="Escolha um nome de usuário">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Crie uma senha">
    </div>
    <button class="btn-submit" onclick="handleCadastro()">Criar Conta</button>
    <div class="card-link">
      Já tem uma conta? <a href="login.html">Faça login</a>
    </div>
  </div>

  <script>
    function handleCadastro() {
      const fullname = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');

      if (!fullname || !email || !username || !password) {
        showMsg('Preencha todos os campos.', 'error'); return;
      }
      if (password.length < 4) {
        showMsg('A senha deve ter pelo menos 4 caracteres.', 'error'); return;
      }

      const users = JSON.parse(localStorage.getItem('cf_users') || '[]');
      if (users.find(u => u.username === username)) {
        showMsg('Nome de usuário já está em uso.', 'error'); return;
      }

      users.push({ fullname, email, username, password });
      localStorage.setItem('cf_users', JSON.stringify(users));
      showMsg('Conta criada com sucesso! Redirecionando...', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = `msg ${type}`;
      el.style.display = 'block';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleCadastro(); });
  </script>
</body>
</html>
